<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0C447C"/>
      <stop offset="100%" style="stop-color:#082050"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8530A"/>
      <stop offset="100%" style="stop-color:#F97316"/>
    </linearGradient>
    <linearGradient id="groundGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8530A" stop-opacity="0"/>
      <stop offset="30%" style="stop-color:#E8530A" stop-opacity="0.7"/>
      <stop offset="70%" style="stop-color:#1B4FD8" stop-opacity="0.5"/>
      <stop offset="100%" style="stop-color:#1B4FD8" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="speedGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fond bleu marine -->
  <rect width="400" height="400" rx="52" fill="url(#bgGrad)"/>

  <!-- Halo ambiance derrière le coureur -->
  <ellipse cx="210" cy="210" r="110" fill="#1B4FD8" opacity="0.06"/>

  <!-- SOL — ligne + ombre portée -->
  <!-- Ombre au sol sous le coureur -->
  <ellipse cx="215" cy="296" rx="68" ry="9" fill="#000" opacity="0.22"/>
  <!-- Ligne de piste (sol) -->
  <rect x="40" y="290" width="320" height="5" rx="2.5" fill="url(#groundGrad)"/>
  <!-- Petit relief de piste -->
  <rect x="40" y="290" width="320" height="1.5" rx="1" fill="#E8530A" opacity="0.15"/>

  <!-- TRAITS DE VITESSE — larges, bien visibles -->
  <!-- Groupe de lignes à gauche du coureur -->
  <line x1="48"  y1="205" x2="128" y2="205" stroke="#E8530A" stroke-width="4"   stroke-linecap="round" opacity="0.85" filter="url(#speedGlow)"/>
  <line x1="32"  y1="220" x2="118" y2="220" stroke="#E8530A" stroke-width="2.8" stroke-linecap="round" opacity="0.6"  filter="url(#speedGlow)"/>
  <line x1="55"  y1="235" x2="122" y2="235" stroke="#E8530A" stroke-width="2"   stroke-linecap="round" opacity="0.38"/>
  <line x1="42"  y1="248" x2="108" y2="248" stroke="#1B4FD8" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="62"  y1="260" x2="112" y2="260" stroke="#1B4FD8" stroke-width="1"   stroke-linecap="round" opacity="0.22"/>

  <!-- COUREUR — grand, centré légèrement à droite -->
  <g transform="translate(148, 92)" filter="url(#softGlow)">
    <!-- Tête -->
    <circle cx="68" cy="12" r="16" fill="#EDF2FB"/>

    <!-- Corps incliné en avant (sprint) -->
    <line x1="65" y1="28" x2="57" y2="80" stroke="#EDF2FB" stroke-width="9" stroke-linecap="round"/>

    <!-- Bras gauche tendu en avant-bas -->
    <line x1="62" y1="42" x2="28" y2="68" stroke="#EDF2FB" stroke-width="7" stroke-linecap="round"/>
    <line x1="28" y1="68" x2="14" y2="58" stroke="#EDF2FB" stroke-width="6" stroke-linecap="round"/>

    <!-- Bras droit en arrière -->
    <line x1="62" y1="42" x2="90" y2="60" stroke="#EDF2FB" stroke-width="7" stroke-linecap="round"/>
    <line x1="90" y1="60" x2="104" y2="50" stroke="#EDF2FB" stroke-width="6" stroke-linecap="round"/>

    <!-- Jambe droite — poussée arrière (blanc) -->
    <line x1="57" y1="80" x2="76" y2="124" stroke="#EDF2FB" stroke-width="8.5" stroke-linecap="round"/>
    <line x1="76" y1="124" x2="96" y2="106" stroke="#EDF2FB" stroke-width="7.5" stroke-linecap="round"/>

    <!-- Jambe gauche — genou haut levé (orange, en avant) -->
    <line x1="57" y1="80" x2="36" y2="118" stroke="url(#orangeGrad)" stroke-width="8.5" stroke-linecap="round"/>
    <line x1="36" y1="118" x2="20" y2="148" stroke="url(#orangeGrad)" stroke-width="7.5" stroke-linecap="round"/>

    <!-- Chaussure gauche (orange) -->
    <ellipse cx="14" cy="154" rx="14" ry="6" fill="#E8530A"/>
    <!-- Chaussure droite (blanc) -->
    <ellipse cx="100" cy="110" rx="13" ry="5.5" fill="#EDF2FB"/>
  </g>

  <!-- Point vert actif (comme dans l'app) -->
  <circle cx="316" cy="100" r="7" fill="#7FD4A8" opacity="0.9" filter="url(#softGlow)"/>

  <!-- Séparateur -->
  <line x1="50" y1="312" x2="350" y2="312" stroke="#1B4FD8" stroke-width="1" opacity="0.35"/>

  <!-- Texte EN PISTE -->
  <text x="200" y="350" font-family="'Arial Black', 'Helvetica Neue', sans-serif"
        font-size="54" font-weight="900" fill="#EDF2FB"
        text-anchor="middle" letter-spacing="5">EN PISTE</text>

  <!-- Sous-texte -->
  <text x="200" y="374" font-family="'Arial', 'Helvetica Neue', sans-serif"
        font-size="12" font-weight="700" fill="#E8530A"
        text-anchor="middle" letter-spacing="7" opacity="0.9">COACH RUNNING</text>
</svg>
