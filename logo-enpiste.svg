<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0C447C"/>
      <stop offset="100%" style="stop-color:#082050"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8530A"/>
      <stop offset="100%" style="stop-color:#F97316"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B4FD8"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fond bleu marine arrondi -->
  <rect width="400" height="400" rx="52" fill="url(#bgGrad)"/>

  <!-- Halo de fond subtil -->
  <circle cx="200" cy="170" r="130" fill="#1B4FD8" opacity="0.07"/>

  <!-- Piste ovale — couche de surface -->
  <ellipse cx="200" cy="178" rx="148" ry="98" fill="#0a3560"/>

  <!-- Couloirs de piste -->
  <ellipse cx="200" cy="178" rx="148" ry="98" fill="none" stroke="#1a5a9c" stroke-width="1" opacity="0.6"/>
  <ellipse cx="200" cy="178" rx="132" ry="82" fill="none" stroke="#1a5a9c" stroke-width="1" opacity="0.6"/>
  <ellipse cx="200" cy="178" rx="116" ry="66" fill="none" stroke="#1a5a9c" stroke-width="1" opacity="0.5"/>
  <ellipse cx="200" cy="178" rx="100" ry="50" fill="none" stroke="#1a5a9c" stroke-width="1" opacity="0.4"/>

  <!-- Intérieur pelouse -->
  <ellipse cx="200" cy="178" rx="84" ry="34" fill="#0b3d20" opacity="0.7"/>

  <!-- Ligne de départ orange -->
  <rect x="196" y="80" width="8" height="48" rx="4" fill="url(#orangeGrad)" filter="url(#softGlow)"/>

  <!-- Silhouette coureur — propre et dynamique -->
  <!-- Position : légèrement décalée à droite sur la piste, en foulée -->
  <g transform="translate(192, 118)" filter="url(#subtleGlow)">
    <!-- Tête -->
    <circle cx="20" cy="5" r="8.5" fill="#EDF2FB"/>
    <!-- Corps incliné vers l'avant -->
    <line x1="20" y1="13.5" x2="17" y2="38" stroke="#EDF2FB" stroke-width="4.5" stroke-linecap="round"/>
    <!-- Bras gauche tendu en avant -->
    <line x1="19" y1="19" x2="5" y2="30" stroke="#EDF2FB" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Bras droit en arrière -->
    <line x1="19" y1="19" x2="33" y2="26" stroke="#EDF2FB" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Jambe droite (arrière — poussée) -->
    <line x1="17" y1="38" x2="28" y2="52" stroke="#EDF2FB" stroke-width="4" stroke-linecap="round"/>
    <line x1="28" y1="52" x2="34" y2="44" stroke="#EDF2FB" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Jambe gauche (avant — levée, genou haut) -->
    <line x1="17" y1="38" x2="8" y2="50" stroke="url(#orangeGrad)" stroke-width="4" stroke-linecap="round"/>
    <line x1="8" y1="50" x2="2" y2="62" stroke="url(#orangeGrad)" stroke-width="3.5" stroke-linecap="round"/>
  </g>

  <!-- Traits de vitesse -->
  <line x1="110" y1="182" x2="145" y2="182" stroke="#E8530A" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="103" y1="191" x2="141" y2="191" stroke="#E8530A" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
  <line x1="107" y1="200" x2="138" y2="200" stroke="#E8530A" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>

  <!-- Point vert (statut actif, comme dans l'app) -->
  <circle cx="200" cy="82" r="6" fill="#7FD4A8" filter="url(#subtleGlow)"/>

  <!-- Séparateur avant texte -->
  <line x1="60" y1="294" x2="340" y2="294" stroke="#1B4FD8" stroke-width="1" opacity="0.4"/>

  <!-- Texte principal -->
  <text x="200" y="330" font-family="'Arial Black', 'Helvetica Neue', sans-serif"
        font-size="52" font-weight="900" fill="#EDF2FB"
        text-anchor="middle" letter-spacing="5">EN PISTE</text>

  <!-- Sous-texte -->
  <text x="200" y="355" font-family="'Arial', 'Helvetica Neue', sans-serif"
        font-size="12" font-weight="600" fill="#E8530A"
        text-anchor="middle" letter-spacing="7" opacity="0.95">COACH RUNNING</text>
</svg>
