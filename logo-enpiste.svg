<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="trackGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8411a"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fond -->
  <rect width="400" height="400" rx="48" fill="url(#bgGrad)"/>

  <!-- Piste ovale extérieure -->
  <ellipse cx="200" cy="185" rx="145" ry="95" fill="none" stroke="#2a2a4a" stroke-width="38"/>
  <!-- Piste ovale intérieure (pelouse) -->
  <ellipse cx="200" cy="185" rx="107" ry="57" fill="#0f2a1a" opacity="0.6"/>

  <!-- Lignes de piste (couloirs) -->
  <ellipse cx="200" cy="185" rx="128" ry="76" fill="none" stroke="#2a2a4a" stroke-width="1.5" opacity="0.8"/>
  <ellipse cx="200" cy="185" rx="113" ry="61" fill="none" stroke="#2a2a4a" stroke-width="1.5" opacity="0.8"/>

  <!-- Ligne de départ/arrivée orange -->
  <line x1="200" y1="90" x2="200" y2="132" stroke="url(#trackGrad)" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Silhouette coureur stylisée -->
  <!-- Corps du coureur en mouvement -->
  <g transform="translate(178, 148) rotate(-8)" filter="url(#glow)">
    <!-- Tête -->
    <circle cx="22" cy="4" r="7" fill="url(#accentGrad)"/>
    <!-- Corps -->
    <line x1="22" y1="11" x2="20" y2="32" stroke="url(#accentGrad)" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Bras gauche (en avant) -->
    <line x1="20" y1="16" x2="8" y2="25" stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round"/>
    <!-- Bras droit (en arrière) -->
    <line x1="20" y1="16" x2="34" y2="22" stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round"/>
    <!-- Jambe gauche (en avant, levée) -->
    <line x1="20" y1="32" x2="10" y2="46" stroke="url(#accentGrad)" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="10" y1="46" x2="4" y2="56" stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round"/>
    <!-- Jambe droite (en arrière, poussée) -->
    <line x1="20" y1="32" x2="30" y2="44" stroke="url(#accentGrad)" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="30" y1="44" x2="36" y2="38" stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Trait de vitesse -->
  <line x1="130" y1="195" x2="155" y2="195" stroke="#f97316" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="124" y1="202" x2="152" y2="202" stroke="#f97316" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="128" y1="209" x2="150" y2="209" stroke="#f97316" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>

  <!-- Texte EN PISTE -->
  <text x="200" y="318" font-family="'Arial Black', 'Helvetica Neue', sans-serif" font-size="46" font-weight="900" fill="white" text-anchor="middle" letter-spacing="4">EN PISTE</text>

  <!-- Sous-titre -->
  <text x="200" y="346" font-family="'Arial', sans-serif" font-size="13" font-weight="400" fill="#f97316" text-anchor="middle" letter-spacing="6" opacity="0.9">MARATHON COACH</text>

  <!-- Point décoratif accent -->
  <circle cx="200" cy="363" r="3" fill="#f97316" opacity="0.7"/>
</svg>
