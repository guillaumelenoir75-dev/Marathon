<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Fond bleu marine plein (pas de filtre, pas de transparence) -->
  <rect width="512" height="512" fill="#0C447C"/>

  <!-- Halo simple sans filtre -->
  <circle cx="256" cy="220" r="160" fill="#1B4FD8" opacity="0.08"/>

  <!-- Piste ovale -->
  <ellipse cx="256" cy="228" rx="190" ry="126" fill="#0a3560"/>
  <ellipse cx="256" cy="228" rx="190" ry="126" fill="none" stroke="#1a5a9c" stroke-width="1.5" opacity="0.7"/>
  <ellipse cx="256" cy="228" rx="169" ry="105" fill="none" stroke="#1a5a9c" stroke-width="1.5" opacity="0.6"/>
  <ellipse cx="256" cy="228" rx="148" ry="84" fill="none" stroke="#1a5a9c" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="256" cy="228" rx="127" ry="63" fill="none" stroke="#1a5a9c" stroke-width="1" opacity="0.4"/>
  <!-- Pelouse intérieure -->
  <ellipse cx="256" cy="228" rx="106" ry="42" fill="#0b3d20" opacity="0.65"/>

  <!-- Ligne de départ orange (simple rect, pas de filtre) -->
  <rect x="248" y="102" width="16" height="60" rx="8" fill="#E8530A"/>

  <!-- SOL -->
  <ellipse cx="272" cy="378" rx="86" ry="11" fill="#000" opacity="0.2"/>
  <rect x="50" y="372" width="412" height="6" rx="3" fill="#E8530A" opacity="0.5"/>
  <rect x="50" y="372" width="412" height="2" rx="1" fill="#1B4FD8" opacity="0.3"/>

  <!-- TRAITS DE VITESSE -->
  <line x1="60"  y1="262" x2="162" y2="262" stroke="#E8530A" stroke-width="6"   stroke-linecap="round" opacity="0.85"/>
  <line x1="40"  y1="282" x2="150" y2="282" stroke="#E8530A" stroke-width="4"   stroke-linecap="round" opacity="0.6"/>
  <line x1="68"  y1="302" x2="154" y2="302" stroke="#E8530A" stroke-width="3"   stroke-linecap="round" opacity="0.38"/>
  <line x1="52"  y1="320" x2="138" y2="320" stroke="#1B4FD8" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>

  <!-- COUREUR — sans filtre, traits épais bien lisibles -->
  <g transform="translate(188, 116)">
    <!-- Tête -->
    <circle cx="88" cy="16" r="20" fill="#EDF2FB"/>
    <!-- Corps -->
    <line x1="84" y1="36" x2="74" y2="102" stroke="#EDF2FB" stroke-width="12" stroke-linecap="round"/>
    <!-- Bras gauche -->
    <line x1="80" y1="54" x2="36" y2="88" stroke="#EDF2FB" stroke-width="10" stroke-linecap="round"/>
    <line x1="36" y1="88" x2="18" y2="74" stroke="#EDF2FB" stroke-width="9"  stroke-linecap="round"/>
    <!-- Bras droit -->
    <line x1="80" y1="54" x2="116" y2="76" stroke="#EDF2FB" stroke-width="10" stroke-linecap="round"/>
    <line x1="116" y1="76" x2="134" y2="64" stroke="#EDF2FB" stroke-width="9"  stroke-linecap="round"/>
    <!-- Jambe droite (poussée arrière) -->
    <line x1="74" y1="102" x2="98" y2="158" stroke="#EDF2FB" stroke-width="11" stroke-linecap="round"/>
    <line x1="98" y1="158" x2="124" y2="136" stroke="#EDF2FB" stroke-width="10" stroke-linecap="round"/>
    <ellipse cx="128" cy="133" rx="17" ry="7" fill="#EDF2FB"/>
    <!-- Jambe gauche (genou levé) -->
    <line x1="74" y1="102" x2="46" y2="150" stroke="#EDF2FB" stroke-width="11" stroke-linecap="round"/>
    <line x1="46" y1="150" x2="26" y2="188" stroke="#EDF2FB" stroke-width="10" stroke-linecap="round"/>
    <ellipse cx="20" cy="190" rx="17" ry="7" fill="#EDF2FB"/>
  </g>

  <!-- Séparateur -->
  <line x1="60" y1="398" x2="452" y2="398" stroke="#1B4FD8" stroke-width="1.5" opacity="0.4"/>

  <!-- EN PISTE -->
  <text x="256" y="448" font-family="Arial Black, Helvetica Neue, sans-serif"
        font-size="68" font-weight="900" fill="#EDF2FB"
        text-anchor="middle" letter-spacing="6">EN PISTE</text>

  <!-- COACH RUNNING -->
  <text x="256" y="480" font-family="Arial, Helvetica Neue, sans-serif"
        font-size="18" font-weight="700" fill="#E8530A"
        text-anchor="middle" letter-spacing="8">COACH RUNNING</text>
</svg>
