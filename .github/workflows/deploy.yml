name: Deploy to Firebase

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_SECRET }}
        run: |
          firebase deploy --only functions --token "$FIREBASE_TOKEN" --project prepa-marathon --non-interactive
          firebase deploy --only hosting:prepa-marathon --token "$FIREBASE_TOKEN" --project prepa-marathon --non-interactive
